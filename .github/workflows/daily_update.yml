name: Daily Macro Update

on:
  schedule:
    - cron: '30 0 * * *'   # 6:00 AM IST = 00:30 UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic python-dotenv markdown

      - name: Run daily update
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python daily_update.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data.json
          git diff --staged --quiet || git commit -m "Daily update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push